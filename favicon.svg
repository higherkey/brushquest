<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Brand Background Layers -->
  <circle cx="256" cy="256" r="256" fill="#0f172a" />
  <circle cx="256" cy="256" r="235" fill="#ffffff" />
  <circle cx="256" cy="256" r="215" fill="#a855f7" />

  <!-- Background Accents -->
  <circle cx="150" cy="150" r="12" fill="#ffffff" opacity="0.4" />
  <circle cx="400" cy="350" r="10" fill="#38bdf8" opacity="0.6" />

  <!-- B-Toothbrush -->
  <g transform="translate(256, 256) rotate(-45) translate(-256, -256)">
    <!-- Thin Professional Handle -->
    <rect x="40" y="241" width="400" height="30" rx="15" fill="#1e40af" />
    
    <!-- Head/Bristles forming the letter 'B' -->
    <g transform="translate(260, 241)">
      <!-- First Loop of B -->
      <path d="M0 0 a45 45 0 0 1 90 0 z" fill="#3b82f6" />
      <!-- Second Loop of B -->
      <path d="M90 0 a45 45 0 0 1 90 0 z" fill="#3b82f6" />
      
      <!-- Bristle texture/definition -->
      <path d="M10 0 v-20 M30 0 v-30 M50 0 v-30 M70 0 v-20" stroke="#ffffff" stroke-width="2" opacity="0.3" />
      <path d="M100 0 v-20 M120 0 v-30 M140 0 v-30 M160 0 v-20" stroke="#ffffff" stroke-width="2" opacity="0.3" />
    </g>
  </g>
</svg>