<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Navy Outer Border -->
  <circle cx="256" cy="256" r="256" fill="#0f172a" />
  <!-- White Inner Ring -->
  <circle cx="256" cy="256" r="235" fill="#ffffff" />
  <!-- Purple Background -->
  <circle cx="256" cy="256" r="215" fill="#a855f7" />

  <!-- Stars -->
  <circle cx="120" cy="180" r="10" fill="#ffffff" opacity="0.4" />
  <path d="M420 150l12 12-12 12-12-12z" fill="#38bdf8" opacity="0.6" />

  <!-- Toothbrush Group -->
  <g transform="translate(256, 256) rotate(-45) translate(-256, -256)">
    <!-- Toothbrush Handle (Darker Blue) -->
    <rect x="20" y="226" width="380" height="60" rx="30" fill="#1e40af" />
    
    <!-- B-Bristles (Lighter Blue, looping from the handle) -->
    <g transform="translate(310, 106)">
      <!-- Top Loop -->
      <path d="M0 0 h70 a60 60 0 0 1 0 120 h-70 z" fill="#3b82f6" />
      <!-- Bottom Loop -->
      <path d="M0 120 h70 a60 60 0 0 1 0 120 h-70 z" fill="#3b82f6" />
      
      <!-- Inner "B" holes for definition -->
      <path d="M30 30 h10 a30 30 0 0 1 0 60 h-10 z" fill="#a855f7" opacity="0.2" />
      <path d="M30 150 h10 a30 30 0 0 1 0 60 h-10 z" fill="#a855f7" opacity="0.2" />
    </g>
  </g>
</svg>